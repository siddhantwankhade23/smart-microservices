spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/orders/**

            - id: driver-service
              uri: lb://driver-service
              predicates:
                - Path=/drivers/**

            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
                
  logging:
    level:
      org.springframework.cloud.gateway: DEBUG

server:
  port: 8080

jwt:
  secret-key: ${JWT_SECRET}